name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Ensure Pages enabled
        run: |
          python - <<'PY'
          import os, json, urllib.request
          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          url = f'https://api.github.com/repos/{repo}/pages'
          req = urllib.request.Request(url, method='GET', headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json'})
          try:
              with urllib.request.urlopen(req) as r:
                  print(r.read().decode())
          except urllib.error.HTTPError as e:
              if e.code == 404:
                  print('Pages not found, attempting to create via API...')
                  data = json.dumps({'source': {'branch': 'main', 'path': '/docs'}}).encode()
                  req = urllib.request.Request(url, data=data, method='POST', headers={'Authorization': f'Bearer {token}', 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json'})
                  with urllib.request.urlopen(req) as r:
                      print(r.read().decode())
              else:
                  raise
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./my-html-game

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
